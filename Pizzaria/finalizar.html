<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Finalizar Pedido</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-yellow-50 p-6">
    <h1 class="text-3xl font-bold mb-4">Finalizar Pedido</h1>

    <div id="lista-pedido"></div>

    <form
      onsubmit="finalizarPedido(event)"
      class="bg-white p-4 rounded shadow space-y-3"
    >
      <input
        type="text"
        id="nome"
        placeholder="Seu nome"
        required
        class="w-full p-2 border rounded"
      />

      <input
        type="text"
        id="rua"
        placeholder="Rua"
        required
        class="w-full p-2 border rounded"
      />

      <input
        type="number"
        id="numero"
        placeholder="Número da propriedade"
        required
        class="w-full p-2 border rounded"
      />

      <input
        type="tel"
        id="telefone"
        placeholder="Telefone"
        required
        class="w-full p-2 border rounded"
      />

      <button
        type="submit"
        class="bg-green-500 text-white px-4 py-2 rounded w-full"
      >
        Confirmar Pedido
      </button>
    </form>
  </body>
</html>
