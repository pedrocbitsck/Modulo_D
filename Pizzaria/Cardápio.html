<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Cardápio - Bella Massa</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-yellow-50 p-6">
    <div class="text-right mb-4">
      <button
        onclick="toggleDarkMode()"
        class="bg-gray-800 text-white px-4 py-2 rounded"
      >
        🌙 
      </button>
    </div>

    <h1 class="text-3xl font-bold mb-6 text-center">🍕 Cardápio</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white p-4 rounded shadow text-center">
        <img src="Gaguinho.jpg" class="mx-auto mb-3 rounded" />
        <h2 class="text-xl font-bold">Gaguinho</h2>
        <p class="mb-2">R$ 30,00</p>
        <button
          onclick="addItem('Calabresa', 30)"
          class="bg-green-500 text-white px-4 py-2 rounded"
        >
          Adicionar
        </button>
      </div>

      <div class="bg-white p-4 rounded shadow text-center">
        <img src="Frango com catupiry.jpg" class="mx-auto mb-3 rounded" />
        <h2 class="text-xl font-bold">Frango com Catupiry</h2>
        <p class="mb-2">R$ 35,00</p>
        <button
          onclick="addItem('Frango com Catupiry', 35)"
          class="bg-green-500 text-white px-4 py-2 rounded"
        >
          Adicionar
        </button>
      </div>

      <div class="bg-white p-4 rounded shadow text-center">
        <img src="4 queijos.jpg" class="mx-auto mb-3 rounded" />
        <h2 class="text-xl font-bold">Quatro Queijos</h2>
        <p class="mb-2">R$ 40,00</p>
        <button
          onclick="addItem('Quatro Queijos', 40)"
          class="bg-green-500 text-white px-4 py-2 rounded"
        >
          Adicionar
        </button>
      </div>

      <div class="bg-white p-4 rounded shadow text-center">
        <img src="PT.jpg" class="mx-auto mb-3 rounded" />
        <h2 class="text-xl font-bold">Potuguesa</h2>
        <p class="mb-2">R$ 28,00</p>
        <button
          onclick="addItem('portuguesa', 28)"
          class="bg-green-500 text-white px-4 py-2 rounded"
        >
          Adicionar
        </button>
      </div>

      <div class="bg-white p-4 rounded shadow text-center">
        <img src="Magali.jpg" class="mx-auto mb-3 rounded" />
        <h2 class="text-xl font-bold">Margherita</h2>
        <p class="mb-2">R$ 30,00</p>
        <button
          onclick="addItem('Margherita', 30)"
          class="bg-green-500 text-white px-4 py-2 rounded"
        >
          Adicionar
        </button>
      </div>

      <div class="bg-white p-4 rounded shadow text-center">
        <img src="carne seca.jpg" class="mx-auto mb-3 rounded" />
        <h2 class="text-xl font-bold">carne seca</h2>
        <p class="mb-2">R$ 54,00</p>
        <button
          onclick="addItem('Carne Seca', 54)"
          class="bg-green-500 text-white px-4 py-2 rounded"
        >
          Adicionar
        </button>
      </div>
    </div>

    <div class="text-right mt-6">
      <a href="finalizar.html" class="bg-red-500 text-white px-6 py-3 rounded">
        Finalizar Pedido
      </a>
    </div>

    <script>
      function toggleDarkMode() {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
          localStorage.setItem("darkMode", "on");
        } else {
          localStorage.setItem("darkMode", "off");
        }
      }

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
      }
    </script>

    <style>
      .dark {
        background-color: #111 !important;
        color: white;
      }

      .dark .bg-white {
        background-color: #1f1f1f !important;
      }

      .dark .text-black {
        color: white !important;
      }
    </style>
  </body>
</html>
