<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizzaria</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
  </head>

  <body class="bg-yellow-50 text-gray-800 dark:bg-gray-900 dark:text-white">
    <header
      class="bg-red-600 text-white p-4 flex justify-between items-center shadow-lg"
    >
      <h1 class="text-2xl font-bold">Pizzaria Bella Massa</h1>

      <div class="flex items-center gap-4">
        <nav class="space-x-4">
          <a href="contato.html" class="hover:text-yellow-300">Contato</a>
          <a href="Sobre.html" class="hover:text-yellow-300">Sobre</a>
        </nav>

        <button onclick="toggleDark()" class="bg-black px-3 py-1 rounded">
          🌙
        </button>
      </div>
    </header>

    <section
      class="h-screen flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1601924582975-7b8c2d4e6b93')] bg-cover bg-center"
    >
      <div class="bg-black/60 p-10 rounded-2xl text-center">
        <h2 class="text-5xl font-bold text-white mb-4">
          A melhor pizza da cidade
        </h2>
        <p class="text-gray-300 mb-6">Sabor que conquista a cada pedaço</p>

        <a
          href="Cardápio.html"
          class="bg-yellow-400 text-black px-6 py-2 rounded-xl hover:bg-yellow-500 transition"
        >
          Cardápio
        </a>
      </div>
    </section>

    <footer
      class="bg-gray-900 text-center text-gray-400 p-4 dark:bg-black dark:text-gray-300"
    >
      <p>© 2026 Pizzaria Bella Massa</p>
    </footer>

    <script>
      function toggleDark() {
        document.documentElement.classList.toggle("dark");

        if (document.documentElement.classList.contains("dark")) {
          localStorage.setItem("tema", "dark");
        } else {
          localStorage.setItem("tema", "light");
        }
      }

      if (localStorage.getItem("tema") === "dark") {
        document.documentElement.classList.add("dark");
      }
    </script>
  </body>
</html>
